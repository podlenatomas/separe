version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: separe-web
    container_name: separe-web-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Pass through any public/private Next.js environment variables here
      # - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      # - NEXT_PUBLIC_GOOGLE_MAPS_EMBED_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_EMBED_KEY}
    networks:
      - separe-network

networks:
  separe-network:
    driver: bridge
